server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy al backend (nombre del servicio en EasyPanel)
    location /api/ {
        set $backend "http://datos-finanzas2-backend:8001";
        proxy_pass $backend$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering off;

        # Si el backend no responde, devolver 502 en vez de crashear
        error_page 502 503 504 =503 @backend_down;
    }

    location @backend_down {
        default_type application/json;
        return 503 '{"error":"Backend no disponible"}';
    }

    # React SPA - todas las rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
